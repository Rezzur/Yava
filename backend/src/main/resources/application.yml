spring:
  application:
    name: yavimax-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/yavimax
    username: yavimax_user
    password: yavimax_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # For dev purposes, later we switch to validate and use Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 1 day in milliseconds
